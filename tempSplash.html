<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USafe Temp Splash</title>
    <link rel="icon" sizes="192x192" href="images/final USafe logo.jpg">
    <link rel="icon" type="image/png" sizes="32x32" href="images/final USafe logo.jpg">
    <link rel="icon" type="image/png" sizes="16x16" href="images/final USafe logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            font-family: "Poppins", sans-serif;
        }

        .temp-splash {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: grid;
            place-items: center;
            text-align: center;
            color: #ffffff;
        }

        .temp-splash video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .temp-splash::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
        }

        .temp-content {
            position: relative;
            z-index: 1;
            padding: 24px;
        }

        .temp-content h1 {
            margin: 0 0 10px;
            font-size: clamp(2rem, 6vw, 4rem);
            line-height: 1.1;
        }

        .temp-content p {
            margin: 0;
            font-size: clamp(1rem, 2.2vw, 1.25rem);
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <section class="temp-splash">
        <video autoplay muted loop playsinline>
            <source src="images/hero_bg.mp4" type="video/mp4">
        </video>
        <div class="temp-content">
            <h1>USafe</h1>
            <p>Temporary splash using the home background media.</p>
        </div>
    </section>
</body>
</html>
